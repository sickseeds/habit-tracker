<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habit Tracker</title>
    <link rel="icon" type="image/x-icon" href="../razor.png">
    <link href="https://fonts.cdnfonts.com/css/belina-demo" rel="stylesheet">
                
</head>
<body>
    <!-- TITLE AND SUBTITLE -->
    <h1 id="title">Month</h1>
    <h2 id="subtitle">Monthly Habit Tracker</h2>

    <!-- CALENDAR AREA -->
    <div id="calendarContainer">
        <div id="calendarDiv">
            <div id="calendarHeading">
                <p id="habitTitle">My New Habit</p>
                <p id="totalDays">0/31</p>
            </div>
            <div id="calendarContent">
                <div id="tracker">
                    <div class="days">
                        <div class="day">1</div>
                        <div class="day">2</div>
                        <div class="day">3</div>
                        <div class="day">4</div>
                        <div class="day">5</div>
                    </div>
                    <div class="days">
                        <div class="day">1</div>
                        <div class="day">2</div>
                        <div class="day">3</div>
                        <div class="day">4</div>
                        <div class="day">5</div>
                    </div>
                    <div class="days">
                        <div class="day">1</div>
                        <div class="day">2</div>
                        <div class="day">3</div>
                        <div class="day">4</div>
                        <div class="day">5</div>
                    </div>
                    <div class="days">
                        <div class="day">1</div>
                        <div class="day">2</div>
                        <div class="day">3</div>
                        <div class="day">4</div>
                        <div class="day">5</div>
                    </div>
                    <div class="days">
                        <div class="day">1</div>
                        <div class="day">2</div>
                        <div class="day">3</div>
                        <div class="day">4</div>
                        <div class="day">5</div>
                    </div>
                </div>
            </div>
        </div>
        <!-- Calendar content will be generated here -->
    </div>
    <button id="resetButton">Reset</button>
</body>
<style>
    body {
        background-image: url("https://file.garden/Zpt04KL0r1V-kQd1/Morute/65d4a947e87ebeb19c54ff95247cc022.jpg");
        background-size: cover;
        background-color: lightpink;
        background-blend-mode: lighten;
        text-align: center;
        font-family: 'Belina Demo', sans-serif;
    }
    #title {
        margin-top: 100px;
        line-height:10px;
    }
    #subtitle {
        opacity: 0.7;
        font-size: 18px;
        margin-bottom: 20px;
        color: #555;
    }
    #calendarContainer {
        display: flex;
        justify-content: end;
    }
    #calendarDiv {
        background-color: rgba(255, 255, 255, 0.8);
        border-radius: 10px 10px 20px 20px;
        margin: auto;
        align-content: center;
        text-align: center;  
    }
    #calendarHeading {
        display: flex;
        justify-content: space-between;
        border-radius: 10px 10px 0px 0px;
        border: 2px solid black;
        padding: 0px 20px;
        font-size: 20px;
        background-color: rosybrown;
        line-height: 0px;
    }
    #calendarContent {
        padding: 20px;
        border: 2px black solid;
    }
    .days {
        display:flex;
    }
    .day {
        width: 30px;
        margin: 3px;
        padding: 10px;
        font-size: 15px;
        text-align:center;
        border-radius: 20px;
        border:2px solid black;
        background-color: mistyrose;
    }
</style>
</html>
